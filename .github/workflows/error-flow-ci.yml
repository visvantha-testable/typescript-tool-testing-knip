name: Error Flow Verification CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  knip-error-flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run trigger
      - run: npm run verify
